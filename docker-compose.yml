version: '3.8'

services:
  backend:
    build: 
      context:
      dockerfile: Dockerfile.backend
    container_name: todo-backend
    ports:
      - "8000:8000"
    environment:
      - bot_token=${bot_token}
      - urldatabase=${urldatabase}
    volumes:
      - ./todo.db:/app/todo.db
    networks:
      - todo-net
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: todo-frontend
    restarts: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
    - todo-net

networks:
  todo-net:
    driver: bridge